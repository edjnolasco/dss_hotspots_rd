name: CI - DSS_Hotspots_RD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar sintaxis Python
        run: python -m compileall app src

      - name: Test mínimo del pipeline DSS
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import pandas as pd

          # Asegurar path del proyecto
          sys.path.append(str(Path('.').resolve()))

          from src.pipeline import run_pipeline

          # Cargar dataset de ejemplo
          df = pd.read_csv("data/fallecimientos_provincias.csv")

          # Normalización básica (compatible con tu código)
          df.columns = [c.strip().lower() for c in df.columns]

          if "año" in df.columns:
              df = df.rename(columns={"año": "year"})
          elif "ano" in df.columns:
              df = df.rename(columns={"ano": "year"})

          # Validación de estructura mínima
          required = {"provincia", "year", "fallecidos"}
          if not required.issubset(df.columns):
              raise ValueError(f"Columnas requeridas faltantes: {required}")

          # Crear campos esperados por el pipeline
          df["month"] = 1
          df["fecha"] = pd.to_datetime(dict(year=df["year"], month=1, day=1))

          # Ejecutar pipeline
          result = run_pipeline(df)

          # Validación flexible (no rompe por diferencias internas)
          if isinstance(result, tuple):
              assert len(result) >= 2
          elif isinstance(result, dict):
              assert "ranking_df" in result or "ranking" in result

          print("CI OK: pipeline ejecutado correctamente")
          PY
