name: CI - DSS_Hotspots_RD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Actualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar sintaxis Python
        run: python -m compileall app src

      - name: Test mínimo del pipeline DSS
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import pandas as pd

          sys.path.append(str(Path(".").resolve()))

          from src.pipeline import run_pipeline
          from src.data_sources import normalize_official_provinces

          df = pd.read_csv("data/fallecimientos_provincias.csv")
          normalized_df = normalize_official_provinces(df)

          result = run_pipeline(normalized_df)

          assert isinstance(result, dict), "El pipeline debe devolver un diccionario"
          assert "ranking_df" in result, "No se encontró ranking_df en la salida"
          assert not result["ranking_df"].empty, "ranking_df está vacío"

          print("CI OK: pipeline ejecutado correctamente")
          PY
